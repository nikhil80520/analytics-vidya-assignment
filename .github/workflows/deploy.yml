name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Copy files to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "."
        target: "~/analytics-vidya"

    - name: Execute deployment script on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/analytics-vidya
          chmod +x setup_free_tier.sh
          ./setup_free_tier.sh
          
          # Create .env file dynamically from GitHub Secrets
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" > .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}" >> .env
          echo "KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }}" >> .env
          echo "KAGGLE_KEY=${{ secrets.KAGGLE_KEY }}" >> .env
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
          echo "PINECONE_INDEX_NAME=python-qa-index" >> .env
          echo "PINECONE_CLOUD=aws" >> .env
          echo "PINECONE_REGION=us-east-1" >> .env
          echo "BEDROCK_LLM_MODEL_ID=qwen.qwen3-32b-v1:0" >> .env
          echo "BEDROCK_EMBEDDING_MODEL_ID=amazon.titan-embed-text-v2:0" >> .env
          
          # Build and start Docker containers
          sudo docker-compose up -d --build
